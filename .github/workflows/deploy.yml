name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Pull to server
    runs-on: self-hosted
    steps:
      - name: Pull latest changes
        run: git -C ${{ vars.DEPLOY_PATH }} pull origin main

      - name: Rebuild image
        run: |
          docker build -t geochron-web:local \
            -f ${{ vars.DEPLOY_PATH }}/src/backend/Dockerfile \
            ${{ vars.DEPLOY_PATH }}

      - name: Recreate container
        run: |
          docker stop geochron-web 2>/dev/null || true
          docker rm geochron-web 2>/dev/null || true
          docker run -d \
            --name geochron-web \
            -p 5002:5002 \
            -v /docker/appdata/geochron-web/tile_cache:/cache:rw \
            --restart unless-stopped \
            geochron-web:local

      - name: Confirm
        run: |
          echo "Deployed at $(date)"
          echo "HEAD: $(git -C ${{ vars.DEPLOY_PATH }} rev-parse --short HEAD)"
